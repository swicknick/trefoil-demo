<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trefoil — Emotion States</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e006b;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  nav {
    width: 152px;
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    overflow-y: auto;
    flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  nav button {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.4);
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 450;
    text-align: left;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.01em;
    line-height: 1.3;
  }

  nav button:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.75); }
  nav button.active { background: rgba(255,255,255,0.1); color: #fff; font-weight: 600; }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }

  svg { display: block; overflow: visible; }

  .panel {
    width: 272px;
    overflow-y: auto;
    flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.06);
    font-size: 12px;
    display: flex;
    flex-direction: column;
  }

  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .p-section { padding: 14px 20px 10px; }
  .p-section + .p-section { border-top: 1px solid rgba(255,255,255,0.06); }

  .p-heading {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .p-heading .emo-label {
    font-size: 12px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
  }

  .s-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }

  .s-row label {
    width: 76px;
    flex-shrink: 0;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-align: right;
    user-select: none;
  }

  .s-row input[type="range"] {
    flex: 1;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .s-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 4px rgba(0,0,0,0.3);
  }

  .s-row input[type="range"]::-moz-range-thumb {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
  }

  .s-row .s-val {
    width: 36px;
    flex-shrink: 0;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    font-variant-numeric: tabular-nums;
    text-align: right;
    user-select: none;
  }

  .p-btn {
    width: 100%;
    padding: 7px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .p-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
  .p-btn.flash { border-color: rgba(173,239,193,0.6); color: rgba(173,239,193,0.9); background: rgba(173,239,193,0.08); }

  .btn-row { display: flex; gap: 6px; margin-top: 8px; }
  .btn-row .p-btn { flex: 1; }

  .p-select {
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    cursor: pointer;
    outline: none;
    flex: 1;
  }
  .p-select option { background: #0e006b; }

  /* Color swatches */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-top: 2px;
  }

  .c-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }

  .c-swatch {
    width: 100%;
    height: 22px;
    border-radius: 5px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.15s;
  }

  .c-swatch:hover { transform: scale(1.08); }
  .c-swatch.active { border-color: rgba(255,255,255,0.75); }

  .c-subhead {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.2);
    margin-bottom: 4px;
  }

  .c-name {
    font-size: 8.5px;
    color: rgba(255,255,255,0.28);
    text-align: center;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }
</style>
</head>
<body>

<nav id="nav"></nav>
<aside class="panel" id="panel"></aside>

<main>
  <svg width="120" height="120" viewBox="0 0 96 96">
    <defs>
      <linearGradient id="grad" x1="6" y1="72" x2="90" y2="24" gradientUnits="userSpaceOnUse">
        <stop id="gs0" offset="0%" stop-color="#ffffff"/>
        <stop id="gs1" offset="50%" stop-color="#ffffff"/>
        <stop id="gs2" offset="100%" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="glow-f" x="-100%" y="-100%" width="300%" height="300%" color-interpolation-filters="sRGB">
        <feGaussianBlur id="glow-blur" in="SourceGraphic" stdDeviation="0" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    <g id="tg">
      <path id="tp"
        fill="url(#grad)"
        fill-opacity="0"
        stroke="url(#grad)"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow-f)"/>
    </g>
  </svg>
</main>

<script>
(() => {
  const SZ = 96, PAD = 10;

  // ─── Continua design-system color presets ───────────────────────────────
  // Indices 0-7: solids   Indices 8-15: gradients
  const COLOR_PRESETS = [
    // ── Solids ──────────────────────────────────────────────────────────────
    { name: 'White',      css: '#ffffff',                                          stops: [['#ffffff','0%'],  ['#ffffff','100%']] },
    { name: 'Purple',     css: '#4049FF',                                          stops: [['#4049FF','0%'],  ['#4049FF','100%']] },
    { name: 'Lavender',   css: '#C5B4FF',                                          stops: [['#C5B4FF','0%'],  ['#C5B4FF','100%']] },
    { name: 'Cyan',       css: '#5AEFFD',                                          stops: [['#5AEFFD','0%'],  ['#5AEFFD','100%']] },
    { name: 'Mint',       css: '#ADEFC1',                                          stops: [['#ADEFC1','0%'],  ['#ADEFC1','100%']] },
    { name: 'Energy',     css: '#00F07F',                                          stops: [['#00F07F','0%'],  ['#00F07F','100%']] },
    { name: 'Yellow',     css: '#D5F427',                                          stops: [['#D5F427','0%'],  ['#D5F427','100%']] },
    { name: 'Alert',      css: '#FA4848',                                          stops: [['#FA4848','0%'],  ['#FA4848','100%']] },
    // ── Gradients ────────────────────────────────────────────────────────────
    { name: 'Pur→Lav',   css: 'linear-gradient(135deg,#C5B4FF,#4049FF)',          stops: [['#C5B4FF','0%'],  ['#4049FF','100%']] },
    { name: 'Cyan→Mint',  css: 'linear-gradient(135deg,#ADEFC1,#5AEFFD)',          stops: [['#ADEFC1','0%'],  ['#5AEFFD','100%']] },
    { name: 'Sky→Lav',   css: 'linear-gradient(135deg,#8BDEFF,#D0B9FF)',          stops: [['#8BDEFF','0%'],  ['#D0B9FF','100%']] },
    { name: 'Spectrum',   css: 'linear-gradient(135deg,#5AEFFD,#ADEFC1,#00F07F)', stops: [['#5AEFFD','0%'],  ['#ADEFC1','45%'],['#00F07F','100%']] },
    { name: 'Energy Grd', css: 'linear-gradient(135deg,#ADEFC1,#00F07F)',          stops: [['#ADEFC1','0%'],  ['#00F07F','100%']] },
    { name: 'Warm',       css: 'linear-gradient(135deg,#F0AF32,#D5F427)',          stops: [['#F0AF32','0%'],  ['#D5F427','100%']] },
    { name: 'Alert Grd',  css: 'linear-gradient(135deg,#FF8080,#FA4848)',          stops: [['#FF8080','0%'],  ['#FA4848','100%']] },
    { name: 'Mint→Yel',  css: 'linear-gradient(135deg,#ADEFC1,#D5F427)',          stops: [['#ADEFC1','0%'],  ['#D5F427','100%']] },
  ];

  const gradEl    = document.getElementById('grad');
  const glowBlur  = document.getElementById('glow-blur');
  const pathEl    = document.getElementById('tp');
  const groupEl   = document.getElementById('tg');

  let currentColorIdx = 0;

  function applyColor(idx) {
    const { stops } = COLOR_PRESETS[idx];
    const ns = 'http://www.w3.org/2000/svg';
    while (gradEl.firstChild) gradEl.removeChild(gradEl.firstChild);
    for (const [color, offset] of stops) {
      const s = document.createElementNS(ns, 'stop');
      s.setAttribute('offset', offset);
      s.setAttribute('stop-color', color);
      gradEl.appendChild(s);
    }
    currentColorIdx = idx;
    document.querySelectorAll('.c-swatch').forEach((el, i) =>
      el.classList.toggle('active', i === idx)
    );
  }

  // ─── Path building ───────────────────────────────────────────────────────
  // Generalised trefoil: x = sin(t) + kA·sin(2t), y = cos(t) − kB·cos(2t)
  // kA & kB default 2 → classic trefoil; morphing them changes the shape.
  let totalLen;
  let lastKA = -999, lastKB = -999;

  function buildAndSetPath(kA, kB) {
    const N = 480;
    let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
    const raw = new Array(N + 1);
    for (let i = 0; i <= N; i++) {
      const t = (i / N) * Math.PI * 2;
      const x = Math.sin(t) + kA * Math.sin(2 * t);
      const y = Math.cos(t) - kB * Math.cos(2 * t);
      raw[i] = [x, y];
      if (x < xMin) xMin = x; if (x > xMax) xMax = x;
      if (y < yMin) yMin = y; if (y > yMax) yMax = y;
    }
    const span = Math.max(xMax - xMin, yMax - yMin);
    const sc   = (SZ - PAD * 2) / span;
    const mx   = (xMin + xMax) / 2;
    const my   = (yMin + yMax) / 2;
    const cx = SZ / 2, cy = SZ / 2;
    const parts = [`M${(cx+(raw[0][0]-mx)*sc).toFixed(2)},${(cy+(raw[0][1]-my)*sc).toFixed(2)}`];
    for (let i = 1; i <= N; i++)
      parts.push(`L${(cx+(raw[i][0]-mx)*sc).toFixed(2)},${(cy+(raw[i][1]-my)*sc).toFixed(2)}`);
    parts.push('Z');
    pathEl.setAttribute('d', parts.join(''));
    lastKA = kA; lastKB = kB;
    return pathEl.getTotalLength();
  }

  totalLen = buildAndSetPath(2, 2);

  // ─── Globals ─────────────────────────────────────────────────────────────
  const globals = { lerpRate: 6, opacity: 1, linecap: 'round' };

  // ─── Emotion presets ─────────────────────────────────────────────────────
  // rot   – base rotation (°)
  // sc    – scale
  // tx/ty – translate
  // ts/te – trim start / end (0–1 of path length)
  // oSpd  – dash offset animation speed
  // wA/wF – rotation wiggle amplitude / frequency
  // soA/soF – scale oscillation amplitude / frequency
  // sw    – stroke width
  // knotA/knotB – shape coefficients (1–3, default 2)
  // glow / glowA / glowF – blur glow + oscillation
  // skewX – horizontal skew (°)
  // fillOp – interior fill opacity (0–0.3)
  const emotions = [
    { name: 'Calm',          color:  0, rot:  0,  sc: 1,    tx: 0,  ty:  0, ts: 0,    te: 1,    oSpd: 0,    wA: 0,   wF: 0,    soA: 0,     soF: 0,   sw: 2,   knotA: 2,   knotB: 2,   glow: 0,   glowA: 0,    glowF: 0,   skewX:  0, fillOp: 0    },
    { name: 'Curious',       color:  9, rot: 14,  sc: 1,    tx: 1,  ty: -1, ts: 0.04, te: 0.80, oSpd: 0.06, wA: 0,   wF: 0,    soA: 0,     soF: 0,   sw: 2,   knotA: 2,   knotB: 2,   glow: 0.5, glowA: 0,    glowF: 0,   skewX:  3, fillOp: 0    },
    { name: 'Joy',           color:  6, rot:  0,  sc: 1.04, tx: 0,  ty: -2, ts: 0,    te: 1,    oSpd: 0.08, wA: 0,   wF: 0,    soA: 0.03,  soF: 2.5, sw: 2.2, knotA: 2,   knotB: 2,   glow: 1.5, glowA: 0.8,  glowF: 2.5, skewX:  0, fillOp: 0.05 },
    { name: 'Worry',         color:  2, rot: -4,  sc: 0.92, tx: 0,  ty:  1, ts: 0.12, te: 0.60, oSpd: 0.04, wA: 1.8, wF: 8,    soA: 0,     soF: 0,   sw: 1.8, knotA: 2.1, knotB: 1.9, glow: 0,   glowA: 0,    glowF: 0,   skewX: -2, fillOp: 0    },
    { name: 'Focus',         color:  8, rot:  0,  sc: 1.06, tx: 0,  ty:  0, ts: 0.02, te: 0.72, oSpd: 0.02, wA: 0,   wF: 0,    soA: 0,     soF: 0,   sw: 2.5, knotA: 2,   knotB: 2,   glow: 1,   glowA: 0,    glowF: 0,   skewX:  0, fillOp: 0.02 },
    { name: 'Surprise',      color: 11, rot:  0,  sc: 1.10, tx: 0,  ty:  0, ts: 0,    te: 1,    oSpd: 0.15, wA: 0,   wF: 0,    soA: 0.05,  soF: 4,   sw: 2.5, knotA: 2,   knotB: 2,   glow: 2,   glowA: 1.5,  glowF: 4,   skewX:  0, fillOp: 0.06 },
    { name: 'Melancholy',    color:  2, rot: -6,  sc: 0.88, tx: 0,  ty:  3, ts: 0.18, te: 0.55, oSpd: 0.03, wA: 0,   wF: 0,    soA: 0,     soF: 0,   sw: 1.6, knotA: 1.8, knotB: 2.2, glow: 0.5, glowA: 0,    glowF: 0,   skewX: -4, fillOp: 0    },
    { name: 'Excitement',    color: 13, rot:  0,  sc: 1.02, tx: 0,  ty:  0, ts: 0,    te: 1,    oSpd: 0.30, wA: 3.5, wF: 5,    soA: 0.02,  soF: 3,   sw: 2.2, knotA: 2,   knotB: 2,   glow: 2.5, glowA: 1,    glowF: 3,   skewX:  0, fillOp: 0.07 },
    { name: 'Serenity',      color:  4, rot:  0,  sc: 1,    tx: 0,  ty:  0, ts: 0,    te: 0.92, oSpd: 0.04, wA: 3,   wF: 0.3,  soA: 0.015, soF: 1.2, sw: 2,   knotA: 2,   knotB: 2,   glow: 1,   glowA: 0.3,  glowF: 0.5, skewX:  0, fillOp: 0.03 },
    { name: 'Tension',       color: 14, rot:  2,  sc: 0.96, tx: 0,  ty:  0, ts: 0.22, te: 0.48, oSpd: 0.25, wA: 1.2, wF: 12,   soA: 0,     soF: 0,   sw: 2,   knotA: 2.3, knotB: 1.7, glow: 0,   glowA: 0,    glowF: 0,   skewX:  4, fillOp: 0    },
    { name: 'Playful',       color: 10, rot: 10,  sc: 1,    tx: 1,  ty: -1, ts: 0.03, te: 0.85, oSpd: 0.12, wA: 2,   wF: 3,    soA: 0.04,  soF: 2,   sw: 2.1, knotA: 2,   knotB: 2,   glow: 1,   glowA: 0.5,  glowF: 2,   skewX:  5, fillOp: 0.04 },
    { name: 'Contemplation', color:  8, rot:  8,  sc: 1,    tx: 0,  ty:  0, ts: 0.06, te: 0.82, oSpd: 0.02, wA: 0.5, wF: 0.4,  soA: 0,     soF: 0,   sw: 2,   knotA: 2,   knotB: 2,   glow: 0.8, glowA: 0,    glowF: 0,   skewX:  3, fillOp: 0.02 },
    { name: 'Rest',          color:  2, rot:  0,  sc: 0.90, tx: 0,  ty:  1, ts: 0.22, te: 0.52, oSpd: 0.01, wA: 0,   wF: 0,    soA: 0.01,  soF: 0.8, sw: 1.5, knotA: 1.9, knotB: 2.1, glow: 0.5, glowA: 0.2,  glowF: 0.6, skewX:  0, fillOp: 0.03 },
    // ── New ──────────────────────────────────────────────────────────────────
    { name: 'Euphoria',      color: 11, rot:  0,  sc: 1.08, tx: 0,  ty: -2, ts: 0,    te: 1,    oSpd: 0.22, wA: 0,   wF: 0,    soA: 0.04,  soF: 3,   sw: 2.5, knotA: 2,   knotB: 2,   glow: 4,   glowA: 1.5,  glowF: 2,   skewX:  0, fillOp: 0.12 },
    { name: 'Wonder',        color: 10, rot:  5,  sc: 1.02, tx: 0,  ty:  0, ts: 0,    te: 0.88, oSpd: 0.05, wA: 0.5, wF: 0.6,  soA: 0.02,  soF: 1,   sw: 2,   knotA: 1.5, knotB: 2.5, glow: 2,   glowA: 0.6,  glowF: 0.8, skewX:  5, fillOp: 0.06 },
    { name: 'Dread',         color: 14, rot: -3,  sc: 0.87, tx: 0,  ty:  2, ts: 0.28, te: 0.55, oSpd: 0.18, wA: 0.8, wF: 14,   soA: 0,     soF: 0,   sw: 1.8, knotA: 2.6, knotB: 1.5, glow: 0,   glowA: 0,    glowF: 0,   skewX: -6, fillOp: 0    },
    { name: 'Flow',          color:  9, rot:  0,  sc: 1,    tx: 0,  ty:  0, ts: 0,    te: 1,    oSpd: 0.09, wA: 2,   wF: 0.5,  soA: 0.02,  soF: 0.8, sw: 2,   knotA: 1.7, knotB: 1.7, glow: 1.5, glowA: 0.5,  glowF: 0.6, skewX:  0, fillOp: 0.05 },
    { name: 'Dreaming',      color:  2, rot:  6,  sc: 0.95, tx: 0,  ty:  0, ts: 0,    te: 0.85, oSpd: 0.03, wA: 0.8, wF: 0.3,  soA: 0.02,  soF: 0.5, sw: 1.8, knotA: 2,   knotB: 2,   glow: 5,   glowA: 1.2,  glowF: 0.4, skewX:  8, fillOp: 0.09 },
    { name: 'Agitated',      color: 14, rot:  0,  sc: 0.97, tx: 0,  ty:  0, ts: 0.08, te: 0.75, oSpd: 0.24, wA: 4,   wF: 10,   soA: 0.03,  soF: 6,   sw: 2,   knotA: 2.5, knotB: 2.5, glow: 0,   glowA: 0,    glowF: 0,   skewX: -3, fillOp: 0    },
    { name: 'Tenderness',    color: 12, rot:  0,  sc: 0.98, tx: 0,  ty:  0, ts: 0,    te: 0.95, oSpd: 0.04, wA: 1,   wF: 0.4,  soA: 0.015, soF: 1,   sw: 2,   knotA: 1.8, knotB: 2,   glow: 2,   glowA: 0.5,  glowF: 0.8, skewX:  2, fillOp: 0.07 },
    { name: 'Confidence',    color:  1, rot:  0,  sc: 1.06, tx: 0,  ty:  0, ts: 0,    te: 1,    oSpd: 0.05, wA: 0,   wF: 0,    soA: 0,     soF: 0,   sw: 2.8, knotA: 2,   knotB: 2,   glow: 1.5, glowA: 0,    glowF: 0,   skewX:  0, fillOp: 0.05 },
    { name: 'Longing',       color: 10, rot: -8,  sc: 0.94, tx: 0,  ty:  2, ts: 0.08, te: 0.78, oSpd: 0.04, wA: 0.5, wF: 0.5,  soA: 0.01,  soF: 0.7, sw: 1.8, knotA: 2.2, knotB: 1.8, glow: 1.5, glowA: 0.3,  glowF: 0.5, skewX: -6, fillOp: 0.04 },
  ];

  const KEYS = ['rot','sc','tx','ty','ts','te','oSpd','wA','wF','soA','soF','sw','knotA','knotB','glow','glowA','glowF','skewX','fillOp'];

  // ─── Slider definitions ──────────────────────────────────────────────────
  const SHAPE_SLIDERS = [
    ['knotA',  'Knot A',       1,    3,    0.01,  2],
    ['knotB',  'Knot B',       1,    3,    0.01,  2],
    ['sc',     'Scale',        0.5,  1.5,  0.01,  2],
    ['skewX',  'Skew X',      -20,   20,   0.5,   1],
    ['fillOp', 'Fill Opacity', 0,    0.3,  0.005, 3],
  ];

  const ANIM_SLIDERS = [
    ['rot',  'Rotation',    -180, 180,  1,     0],
    ['tx',   'Translate X',  -10,  10,  0.5,   1],
    ['ty',   'Translate Y',  -10,  10,  0.5,   1],
    ['ts',   'Trim Start',    0,   1,   0.01,  2],
    ['te',   'Trim End',      0,   1,   0.01,  2],
    ['oSpd', 'Offset Spd',   0,   0.5,  0.01,  2],
    ['wA',   'Wiggle Amp',   0,   10,   0.1,   1],
    ['wF',   'Wiggle Freq',  0,   15,   0.1,   1],
    ['soA',  'Scale Osc A',  0,   0.1,  0.005, 3],
    ['soF',  'Scale Osc F',  0,   5,    0.1,   1],
    ['sw',   'Stroke W',     0.5, 12,   0.1,   1],
  ];

  const FX_SLIDERS = [
    ['glow',  'Base Glow',  0, 8, 0.1, 1],
    ['glowA', 'Glow Osc A', 0, 4, 0.1, 1],
    ['glowF', 'Glow Osc F', 0, 5, 0.1, 1],
  ];

  const ALL_SLIDERS = [...SHAPE_SLIDERS, ...ANIM_SLIDERS, ...FX_SLIDERS];

  const GLOBAL_SLIDERS = [
    ['lerpRate', 'Transition Spd', 1,  20, 0.5,  1],
    ['opacity',  'Stroke Opacity', 0,  1,  0.05, 2],
  ];

  // ─── Animation state ─────────────────────────────────────────────────────
  const cur = {}, tgt = {};
  KEYS.forEach(k => { cur[k] = emotions[0][k]; tgt[k] = emotions[0][k]; });

  let offset = 0, time = 0, lastT = performance.now(), activeIdx = 0;
  const sliderEls = {}, valEls = {}, globalSliderEls = {}, globalValEls = {};

  // ─── Build panel ─────────────────────────────────────────────────────────
  const panelEl = document.getElementById('panel');

  function buildPanel() {
    let h = '';

    // Global
    h += '<div class="p-section"><div class="p-heading">Global</div>';
    for (const [key, label, min, max, step, prec] of GLOBAL_SLIDERS) {
      h += `<div class="s-row"><label>${label}</label>
        <input type="range" id="g-${key}" min="${min}" max="${max}" step="${step}" value="${globals[key]}">
        <span class="s-val" id="gv-${key}">${globals[key].toFixed(prec)}</span></div>`;
    }
    h += `<div class="s-row" style="margin-top:4px"><label>All Stroke W</label>
      <input type="range" id="g-allSw" min="0.5" max="12" step="0.1" value="2">
      <span class="s-val" id="gv-allSw">2.0</span></div>`;
    h += '</div>';

    // Color
    h += '<div class="p-section"><div class="p-heading">Color</div>';
    h += '<div class="c-subhead">Solid</div><div class="color-grid">';
    COLOR_PRESETS.forEach((p, i) => {
      if (i === 8) h += '</div><div class="c-subhead" style="margin-top:8px">Gradient</div><div class="color-grid">';
      h += `<div class="c-wrap">
        <div class="c-swatch${i===0?' active':''}" data-ci="${i}" style="background:${p.css}" title="${p.name}"></div>
        <div class="c-name">${p.name}</div>
      </div>`;
    });
    h += '</div></div>';

    // Shape
    h += '<div class="p-section"><div class="p-heading"><span>Shape</span><span class="emo-label" id="emo-label">Calm</span></div>';
    for (const [key, label, min, max, step, prec] of SHAPE_SLIDERS) {
      h += `<div class="s-row"><label>${label}</label>
        <input type="range" id="s-${key}" min="${min}" max="${max}" step="${step}" value="0">
        <span class="s-val" id="sv-${key}">0</span></div>`;
    }
    h += '</div>';

    // Animation
    h += '<div class="p-section"><div class="p-heading">Animation</div>';
    for (const [key, label, min, max, step, prec] of ANIM_SLIDERS) {
      h += `<div class="s-row"><label>${label}</label>
        <input type="range" id="s-${key}" min="${min}" max="${max}" step="${step}" value="0">
        <span class="s-val" id="sv-${key}">0</span></div>`;
    }
    h += '</div>';

    // FX
    h += '<div class="p-section"><div class="p-heading">FX</div>';
    for (const [key, label, min, max, step, prec] of FX_SLIDERS) {
      h += `<div class="s-row"><label>${label}</label>
        <input type="range" id="s-${key}" min="${min}" max="${max}" step="${step}" value="0">
        <span class="s-val" id="sv-${key}">0</span></div>`;
    }
    h += '</div>';

    // Buttons
    h += `<div class="p-section">
      <div class="btn-row"><button class="p-btn" id="btn-reset">Reset</button><button class="p-btn" id="btn-save">Save</button></div>
      <div class="btn-row" style="margin-top:6px"><button class="p-btn" id="btn-export">Copy All Presets</button></div>
    </div>`;

    panelEl.innerHTML = h;

    // Cache refs
    for (const [key] of ALL_SLIDERS) {
      sliderEls[key] = document.getElementById(`s-${key}`);
      valEls[key]    = document.getElementById(`sv-${key}`);
    }
    for (const [key] of GLOBAL_SLIDERS) {
      globalSliderEls[key] = document.getElementById(`g-${key}`);
      globalValEls[key]    = document.getElementById(`gv-${key}`);
    }

    // Per-emotion sliders
    for (const [key, , , , , prec] of ALL_SLIDERS) {
      sliderEls[key].addEventListener('input', () => {
        const v = parseFloat(sliderEls[key].value);
        tgt[key] = v;
        valEls[key].textContent = v.toFixed(prec);
      });
    }

    // Global sliders
    for (const [key, , , , , prec] of GLOBAL_SLIDERS) {
      globalSliderEls[key].addEventListener('input', () => {
        const v = parseFloat(globalSliderEls[key].value);
        globals[key] = v;
        globalValEls[key].textContent = v.toFixed(prec);
      });
    }

    // All Stroke W
    const allSwEl = document.getElementById('g-allSw');
    document.getElementById('g-allSw').addEventListener('input', () => {
      const v = parseFloat(allSwEl.value);
      document.getElementById('gv-allSw').textContent = v.toFixed(1);
      for (const e of emotions) e.sw = v;
      tgt.sw = v;
      sliderEls.sw.value = v;
      valEls.sw.textContent = v.toFixed(1);
    });

    // Color swatches
    document.querySelectorAll('.c-swatch').forEach(el => {
      el.addEventListener('click', () => {
        applyColor(parseInt(el.dataset.ci));
        emotions[activeIdx].color = currentColorIdx;
      });
    });

    // Save
    document.getElementById('btn-save').addEventListener('click', () => {
      for (const [key] of ALL_SLIDERS) emotions[activeIdx][key] = parseFloat(sliderEls[key].value);
      emotions[activeIdx].color = currentColorIdx;
      const btn = document.getElementById('btn-save');
      btn.classList.add('flash');
      setTimeout(() => btn.classList.remove('flash'), 600);
    });

    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => loadEmotionSliders(activeIdx));

    // Export
    document.getElementById('btn-export').addEventListener('click', () => {
      const data = emotions.map(e => {
        const o = { name: e.name, color: e.color };
        for (const k of KEYS) o[k] = e[k];
        return o;
      });
      navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => {
        const btn = document.getElementById('btn-export');
        btn.textContent = 'Copied!';
        btn.classList.add('flash');
        setTimeout(() => { btn.textContent = 'Copy All Presets'; btn.classList.remove('flash'); }, 1400);
      });
    });
  }

  function loadEmotionSliders(idx) {
    const emo = emotions[idx];
    document.getElementById('emo-label').textContent = emo.name;
    for (const [key, , , , , prec] of ALL_SLIDERS) {
      sliderEls[key].value = emo[key];
      valEls[key].textContent = emo[key].toFixed(prec);
      tgt[key] = emo[key];
    }
    applyColor(emo.color);
  }

  function setEmotion(idx) {
    activeIdx = idx;
    KEYS.forEach(k => { tgt[k] = emotions[idx][k]; });
    loadEmotionSliders(idx);
    document.querySelectorAll('#nav button').forEach((b, i) =>
      b.classList.toggle('active', i === idx)
    );
  }

  // ─── Build nav ───────────────────────────────────────────────────────────
  const navEl = document.getElementById('nav');
  emotions.forEach((e, i) => {
    const btn = document.createElement('button');
    btn.textContent = e.name;
    btn.addEventListener('click', () => setEmotion(i));
    navEl.appendChild(btn);
  });

  buildPanel();
  setEmotion(0);

  // ─── Render loop ─────────────────────────────────────────────────────────
  function tick(now) {
    const dt = Math.min((now - lastT) / 1000, 0.1);
    lastT = now;
    time += dt;

    const ease = 1 - Math.exp(-globals.lerpRate * dt);
    for (const k of KEYS) cur[k] += (tgt[k] - cur[k]) * ease;

    // Rebuild path when shape coefficients drift
    if (Math.abs(cur.knotA - lastKA) > 0.005 || Math.abs(cur.knotB - lastKB) > 0.005)
      totalLen = buildAndSetPath(cur.knotA, cur.knotB);

    offset = ((offset + cur.oSpd * dt) % 1 + 1) % 1;

    const wiggle  = cur.wA  * Math.sin(time * cur.wF  * Math.PI * 2);
    const scOsc   = cur.soA * Math.sin(time * cur.soF * Math.PI * 2);
    const glowOsc = cur.glowA * Math.sin(time * cur.glowF * Math.PI * 2);

    const r       = cur.rot + wiggle;
    const s       = cur.sc + scOsc;
    const glowVal = Math.max(0, cur.glow + glowOsc);

    groupEl.setAttribute('transform',
      `translate(${48 + cur.tx},${48 + cur.ty}) rotate(${r}) skewX(${cur.skewX}) scale(${s}) translate(-48,-48)`
    );

    const vis = Math.max(0, cur.te - cur.ts) * totalLen;
    const gap = totalLen - vis;
    pathEl.style.strokeDasharray  = `${vis} ${gap}`;
    pathEl.style.strokeDashoffset = `${-(cur.ts + offset) * totalLen}`;
    pathEl.style.strokeWidth      = cur.sw;
    pathEl.style.opacity          = globals.opacity;
    pathEl.setAttribute('fill-opacity', cur.fillOp.toFixed(3));

    glowBlur.setAttribute('stdDeviation', glowVal.toFixed(2));

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
